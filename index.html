<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Quick Note Taker</title>
  <style>
    body { font-family: system-ui; padding: 20px; background: #f4f4f4; margin: 0; }
    h1 { color: #2c3e50; margin-bottom: 20px; }
    textarea { width: 95%; height: 60vh; font-size: 18px; padding: 15px; border: 1px solid #ccc; border-radius: 6px; resize: vertical; }
    button { padding: 12px 30px; font-size: 18px; background: #316357; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
    button:hover { background: #3e7a6e; }
    #notes-list { margin-top: 20px; }
    #status { margin-top: 10px; color: gray; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Quick Note Taker</h1>
  <textarea id="note" placeholder="Start typing your note..."></textarea><br><br>
  <button id="new-note">New Note</button>
  <button id="open-file">Open File</button>
  <button id="save">Save Note</button>
  <button id="save-as">Save As</button>
  <button id="deleteBtn" style="background:#f44336;">Delete All</button>
  <p id="status"></p>
  <ul id="notes-list"></ul>
  <script src="renderer.js"></script>
</body>
</html>
